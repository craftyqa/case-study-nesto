name: Playwright Tests
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.0
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: lts/*
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
      - name: Run Playwright tests (pull request — smoke only)
        if: github.event_name == 'pull_request'
        run: npx playwright test --grep "@smoke"
        env:
          BASE_URL: ${{ vars.BASE_URL || 'https://app.qa.nesto.ca' }}
      - name: Run Playwright tests (push to main — smoke + sanity + regression)
        if: github.event_name == 'push'
        run: npx playwright test --grep "@smoke|@sanity|@regression"
        env:
          BASE_URL: ${{ vars.BASE_URL || 'https://app.qa.nesto.ca' }}
      - uses: actions/upload-artifact@v7.0.1
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
